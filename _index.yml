indexpage:
  title: Soluções da FlexPod
  summary: As soluções da FlexPod são um conjunto de recursos estratégicos e tecnológicos
    que enfatizam o portfólio de produtos e serviços da NetApp para atender às necessidades
    de negócios mais críticas de nossos clientes.
  keywords: flexpod, solutions, netapp, cisco, deployments, portfolio, cloud, ontap
  lead: Desenvolvida com base em tecnologias inovadoras da NetApp e da Cisco e confiável
    por milhares de clientes em todo o mundo, a plataforma FlexPod atende e supera
    os desafios de simplificar implantações para a melhor arquitetura de data center
    da categoria. Composto por tecnologias de servidor, rede e storage pré-validadas,
    o FlexPod foi projetado para aumentar a capacidade de resposta DA TI às necessidades
    organizacionais, reduzir os custos de computação e oferecer o máximo de tempo
    de atividade com o mínimo de riscos. Ao simplificar a entrega de dados e aplicações,
    sua empresa ganha a vantagem de executar novos serviços e workloads na borda,
    no centro ou na nuvem.
